<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ReservIA73</title>
  <meta name="theme-color" content="#0f766e" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { color-scheme: light; }
    body { -webkit-tap-highlight-color: transparent; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .card { background: rgba(255,255,255,.92); backdrop-filter: blur(10px); }
    .hidden-soft { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-teal-50 via-white to-sky-50 text-slate-900">
  <div id="app" class="mx-auto max-w-md min-h-screen px-4 py-5 safe-bottom"></div>

  <button id="adminHotspot" aria-label="admin" class="fixed bottom-0 right-0 h-16 w-16 opacity-0">Admin</button>

  <script>
    const SUPABASE_URL = 'https://fktkybjzqsahoklernqe.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrdGt5Ymp6cXNhaG9rbGVybnFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDk1NTksImV4cCI6MjA5MzY4NTU1OX0.EMAR6RC8waEC7PM8clCyM-zxN07UK2Gj0PguRBQiWYE';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const app = document.getElementById('app');

    const state = {
      comunidadCode: localStorage.getItem('reservia73_code') || '',
      comunidad: null,
      viviendas: [],
      recurso: null,
      fecha: toISODate(new Date(Date.now() + 24 * 60 * 60 * 1000)),
      reservas: [],
      selectedSlot: '',
      selectedViviendaId: '',
      pin: '',
      loading: false,
      message: null,
      adminToken: localStorage.getItem('reservia73_admin_token') || '',
      admin: null,
      adminTapCount: 0,
    };

    function toISODate(d) {
      const tzOffset = d.getTimezoneOffset() * 60000;
      return new Date(d - tzOffset).toISOString().slice(0, 10);
    }

    function dayKey(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'][d.getDay()];
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;'}[c]));
    }

    function normalizeError(error) {
      if (!error) return 'Ha ocurrido un error.';
      const msg = error.message || String(error);
      return msg.replace(/^Error:\s*/i, '').replace(/^PGRST\d+:\s*/i, '');
    }

    function setMessage(type, text) {
      state.message = { type, text };
      render();
    }

    async function rpc(name, args) {
      const { data, error } = await sb.rpc(name, args);
      if (error) throw new Error(normalizeError(error));
      return data;
    }

    function shell(inner) {
      app.innerHTML = `
        <header class="mb-5 flex items-center justify-between">
          <div>
            <div class="text-xs font-semibold uppercase tracking-[0.25em] text-teal-700">ReservIA73</div>
            <h1 class="mt-1 text-2xl font-black tracking-tight">Reservas comunitarias</h1>
          </div>
          ${state.comunidad ? `<button onclick="logoutCommunity()" class="rounded-full bg-white px-3 py-2 text-xs font-bold shadow-sm ring-1 ring-slate-200">Cambiar</button>` : ''}
        </header>
        ${state.message ? `<div class="mb-4 rounded-2xl px-4 py-3 text-sm font-semibold ${state.message.type === 'ok' ? 'bg-emerald-50 text-emerald-800 ring-1 ring-emerald-200' : 'bg-rose-50 text-rose-800 ring-1 ring-rose-200'}">${esc(state.message.text)}</div>` : ''}
        ${inner}
      `;
    }

    function render() {
      if (state.loading) return shell(`
        <section class="card rounded-3xl p-6 shadow-xl ring-1 ring-slate-200">
          <div class="flex items-center gap-3">
            <div class="h-5 w-5 animate-spin rounded-full border-2 border-teal-700 border-t-transparent"></div>
            <p class="font-semibold text-slate-700">Cargando...</p>
          </div>
        </section>
      `);
      if (!state.comunidad) return renderCommunityLogin();
      return renderBooking();
    }

    function renderCommunityLogin() {
      shell(`
        <section class="card rounded-3xl p-6 shadow-xl ring-1 ring-slate-200">
          <h2 class="text-xl font-black">Código de comunidad</h2>
          <p class="mt-2 text-sm leading-6 text-slate-600">Introduce el código facilitado por tu comunidad para cargar sus viviendas, recursos y horarios.</p>
          <form onsubmit="loadCommunity(event)" class="mt-5 space-y-4">
            <input id="communityCode" value="${esc(state.comunidadCode)}" autocomplete="off" placeholder="Ej: TEST1" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-center text-xl font-black uppercase tracking-widest outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100" />
            <button class="w-full rounded-2xl bg-teal-700 px-4 py-4 font-black text-white shadow-lg shadow-teal-700/20 active:scale-[0.99]">Entrar</button>
          </form>
          <p class="mt-4 text-center text-xs text-slate-500">Para pruebas: <b>TEST1</b></p>
        </section>
      `);
    }

    async function loadCommunity(event) {
      event?.preventDefault();
      const code = (document.getElementById('communityCode')?.value || state.comunidadCode || '').trim().toUpperCase();
      if (!code) return setMessage('err', 'Introduce el código de comunidad.');
      try {
        state.loading = true; state.message = null; render();
        const comunidad = await rpc('app_resolver_comunidad', { p_codigo_acceso: code });
        const viviendas = await rpc('app_listar_viviendas', { p_codigo_acceso: code });
        state.comunidadCode = code;
        state.comunidad = comunidad;
        state.viviendas = viviendas || [];
        state.recurso = comunidad.recursos?.[0] || null;
        state.selectedViviendaId = '';
        state.selectedSlot = '';
        localStorage.setItem('reservia73_code', code);
        state.loading = false;
        await loadReservations();
      } catch (e) {
        state.loading = false;
        setMessage('err', e.message);
      }
    }

    async function loadReservations() {
      if (!state.comunidad || !state.recurso || !state.fecha) return render();
      try {
        state.loading = true; render();
        state.reservas = await rpc('app_listar_reservas_dia', {
          p_codigo_acceso: state.comunidadCode,
          p_recurso_id: state.recurso.id,
          p_fecha: state.fecha,
        });
        state.loading = false;
        render();
      } catch (e) {
        state.loading = false;
        setMessage('err', e.message);
      }
    }

    function renderBooking() {
      const recursos = state.comunidad.recursos || [];
      const slots = state.recurso?.horario_config?.[dayKey(state.fecha)] || [];
      const taken = new Set((state.reservas || []).map(r => r.hora));
      const viviendasOptions = state.viviendas.map(v => `<option value="${esc(v.id)}">${esc(v.bloque)} · ${esc(v.piso)} · ${esc(v.puerta)}${v.bloqueada ? ' · BLOQUEADA' : ''}</option>`).join('');
      const resourceSelector = recursos.length > 1 ? `
        <div class="grid grid-cols-2 gap-2">
          ${recursos.map(r => `
            <button onclick="selectResource('${esc(r.id)}')" class="rounded-2xl px-3 py-3 text-left font-bold ring-1 ${state.recurso?.id === r.id ? 'bg-teal-700 text-white ring-teal-700' : 'bg-white text-slate-800 ring-slate-200'}">
              <div class="text-xl">${esc(r.icono)}</div>
              <div class="mt-1 text-sm">${esc(r.nombre)}</div>
            </button>
          `).join('')}
        </div>` : '';

      shell(`
        <section class="card rounded-3xl p-5 shadow-xl ring-1 ring-slate-200">
          <div class="mb-4">
            <h2 class="text-xl font-black">${esc(state.comunidad.nombre)}</h2>
            <p class="text-sm text-slate-500">Código ${esc(state.comunidad.codigo_acceso)}</p>
          </div>

          ${resourceSelector}

          <div class="mt-5 grid grid-cols-1 gap-4">
            <label class="block">
              <span class="mb-2 block text-sm font-bold text-slate-700">Fecha</span>
              <input type="date" value="${esc(state.fecha)}" min="${toISODate(new Date())}" onchange="changeDate(this.value)" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 font-bold outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100" />
            </label>
          </div>
        </section>

        <section class="mt-4 card rounded-3xl p-5 shadow-xl ring-1 ring-slate-200">
          <div class="flex items-center justify-between gap-2">
            <h3 class="font-black">${esc(state.recurso?.icono || '📅')} ${esc(state.recurso?.nombre || 'Recurso')}</h3>
            <button onclick="loadReservations()" class="rounded-full bg-slate-100 px-3 py-2 text-xs font-bold text-slate-700">Actualizar</button>
          </div>
          <p class="mt-1 text-xs text-slate-500">Duración: ${esc(state.recurso?.duracion_minutos || 60)} min · Antelación: ${esc(state.recurso?.antelacion_horas || 0)} h</p>
          <div class="mt-4 grid grid-cols-3 gap-2">
            ${slots.length ? slots.map(slot => {
              const isTaken = taken.has(slot);
              const isSel = state.selectedSlot === slot;
              return `<button ${isTaken ? 'disabled' : ''} onclick="selectSlot('${esc(slot)}')" class="rounded-2xl px-2 py-3 text-sm font-black ring-1 ${isTaken ? 'bg-slate-100 text-slate-400 ring-slate-200 line-through' : isSel ? 'bg-teal-700 text-white ring-teal-700' : 'bg-white text-slate-800 ring-slate-200'}">${esc(slot)}</button>`;
            }).join('') : `<div class="col-span-3 rounded-2xl bg-amber-50 p-4 text-sm font-semibold text-amber-800 ring-1 ring-amber-200">No hay horarios configurados para este día.</div>`}
          </div>
        </section>

        <section class="mt-4 card rounded-3xl p-5 shadow-xl ring-1 ring-slate-200">
          <h3 class="font-black">Datos de la vivienda</h3>
          <div class="mt-4 space-y-3">
            <select onchange="state.selectedViviendaId=this.value" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 font-bold outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100">
              <option value="">Selecciona bloque · piso · puerta</option>
              ${viviendasOptions}
            </select>
            <input id="pinInput" inputmode="numeric" autocomplete="off" maxlength="8" placeholder="PIN" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-center text-2xl font-black tracking-[0.35em] outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100" oninput="state.pin=this.value.trim()" />
            <button onclick="createBooking()" class="w-full rounded-2xl bg-teal-700 px-4 py-4 font-black text-white shadow-lg shadow-teal-700/20 active:scale-[0.99]">Reservar</button>
          </div>
        </section>

        <section class="mt-4 card rounded-3xl p-5 shadow-xl ring-1 ring-slate-200">
          <h3 class="font-black">Reservas del día</h3>
          <div class="mt-3 space-y-2">
            ${(state.reservas || []).length ? state.reservas.map(r => `
              <div class="flex items-center justify-between rounded-2xl bg-slate-50 p-3 ring-1 ring-slate-200">
                <div class="font-black">${esc(r.hora)}</div>
                <button onclick="openCancel('${esc(r.id)}','${esc(r.hora)}')" class="rounded-full bg-white px-3 py-2 text-xs font-bold text-rose-700 ring-1 ring-rose-200">Cancelar</button>
              </div>
            `).join('') : `<p class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">No hay reservas activas para este día.</p>`}
          </div>
        </section>
      `);
    }

    async function selectResource(id) {
      state.recurso = (state.comunidad.recursos || []).find(r => r.id === id) || state.recurso;
      state.selectedSlot = '';
      state.reservas = [];
      await loadReservations();
    }

    async function changeDate(value) {
      state.fecha = value;
      state.selectedSlot = '';
      await loadReservations();
    }

    function selectSlot(slot) {
      state.selectedSlot = slot;
      state.message = null;
      render();
    }

    async function createBooking() {
      const viviendaId = document.querySelector('select')?.value || state.selectedViviendaId;
      const pin = document.getElementById('pinInput')?.value.trim() || state.pin;
      if (!state.recurso) return setMessage('err', 'Selecciona un recurso.');
      if (!state.selectedSlot) return setMessage('err', 'Selecciona una hora libre.');
      if (!viviendaId) return setMessage('err', 'Selecciona tu vivienda.');
      if (!pin) return setMessage('err', 'Introduce el PIN.');
      try {
        state.loading = true; render();
        await rpc('app_crear_reserva', {
          p_codigo_acceso: state.comunidadCode,
          p_recurso_id: state.recurso.id,
          p_vivienda_id: viviendaId,
          p_fecha: state.fecha,
          p_hora: state.selectedSlot,
          p_pin: pin,
        });
        state.selectedSlot = '';
        state.pin = '';
        state.loading = false;
        await loadReservations();
        setMessage('ok', 'Reserva creada correctamente.');
      } catch (e) {
        state.loading = false;
        setMessage('err', e.message);
      }
    }

    async function openCancel(reservaId, hora) {
      const pin = prompt(`Introduce el PIN para cancelar la reserva de las ${hora}`);
      if (!pin) return;
      try {
        state.loading = true; render();
        await rpc('app_cancelar_reserva', {
          p_codigo_acceso: state.comunidadCode,
          p_reserva_id: reservaId,
          p_pin: pin.trim(),
        });
        state.loading = false;
        await loadReservations();
        setMessage('ok', 'Reserva cancelada correctamente.');
      } catch (e) {
        state.loading = false;
        setMessage('err', e.message);
      }
    }

    function logoutCommunity() {
      localStorage.removeItem('reservia73_code');
      state.comunidad = null;
      state.comunidadCode = '';
      state.viviendas = [];
      state.recurso = null;
      state.message = null;
      render();
    }

    // Admin básico por triple tap abajo a la derecha.
    document.getElementById('adminHotspot').addEventListener('click', () => {
      state.adminTapCount++;
      setTimeout(() => state.adminTapCount = 0, 1200);
      if (state.adminTapCount >= 3) {
        state.adminTapCount = 0;
        renderAdminLogin();
      }
    });

    function renderAdminLogin() {
      shell(`
        <section class="card rounded-3xl p-6 shadow-xl ring-1 ring-slate-200">
          <h2 class="text-xl font-black">Acceso admin</h2>
          <p class="mt-2 text-sm text-slate-600">Usa el código de comunidad para admin normal. Para superadmin puedes dejarlo vacío.</p>
          <div class="mt-5 space-y-3">
            <input id="adminCode" value="${esc(state.comunidadCode)}" placeholder="Código comunidad" class="w-full rounded-2xl border border-slate-200 px-4 py-3 font-bold uppercase" />
            <input id="adminUser" placeholder="Usuario" class="w-full rounded-2xl border border-slate-200 px-4 py-3 font-bold" />
            <input id="adminPass" type="password" placeholder="Contraseña" class="w-full rounded-2xl border border-slate-200 px-4 py-3 font-bold" />
            <button onclick="adminLogin()" class="w-full rounded-2xl bg-slate-900 px-4 py-4 font-black text-white">Entrar</button>
            <button onclick="render()" class="w-full rounded-2xl bg-white px-4 py-3 font-bold ring-1 ring-slate-200">Volver</button>
          </div>
          <p class="mt-4 text-xs text-slate-500">Prueba: admin / Admin2026 o superadmin / Super2026</p>
        </section>
      `);
    }

    async function adminLogin() {
      try {
        state.loading = true; render();
        const data = await rpc('admin_login', {
          p_codigo_acceso: document.getElementById('adminCode')?.value.trim().toUpperCase() || null,
          p_username: document.getElementById('adminUser')?.value.trim(),
          p_password: document.getElementById('adminPass')?.value,
        });
        state.adminToken = data.token;
        localStorage.setItem('reservia73_admin_token', data.token);
        state.loading = false;
        renderAdminPanel();
      } catch (e) {
        state.loading = false;
        setMessage('err', e.message);
        renderAdminLogin();
      }
    }

    function renderAdminPanel() {
      const rows = state.viviendas.map(v => `
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 p-3 ring-1 ring-slate-200">
          <div>
            <div class="font-black">${esc(v.bloque)} · ${esc(v.piso)} · ${esc(v.puerta)}</div>
            <div class="text-xs ${v.bloqueada ? 'text-rose-700' : 'text-emerald-700'}">${v.bloqueada ? 'Bloqueada' : 'Activa'}</div>
          </div>
          <button onclick="adminToggleHome('${esc(v.id)}', ${!v.bloqueada})" class="rounded-full bg-white px-3 py-2 text-xs font-bold ring-1 ring-slate-200">${v.bloqueada ? 'Desbloquear' : 'Bloquear'}</button>
        </div>
      `).join('');
      shell(`
        <section class="card rounded-3xl p-5 shadow-xl ring-1 ring-slate-200">
          <h2 class="text-xl font-black">Panel admin</h2>
          <p class="mt-1 text-sm text-slate-500">Gestión rápida de viviendas de la comunidad cargada.</p>
          <div class="mt-4 space-y-2">${rows || '<p class="text-sm text-slate-500">Carga primero una comunidad.</p>'}</div>
          <button onclick="adminLogout()" class="mt-4 w-full rounded-2xl bg-slate-900 px-4 py-3 font-black text-white">Salir admin</button>
        </section>
      `);
    }

    async function adminToggleHome(viviendaId, bloquear) {
      try {
        const motivo = bloquear ? (prompt('Motivo del bloqueo, opcional') || '') : '';
        state.loading = true; render();
        await rpc('admin_bloquear_vivienda', {
          p_token: state.adminToken,
          p_vivienda_id: viviendaId,
          p_bloquear: bloquear,
          p_motivo: motivo,
        });
        state.viviendas = await rpc('app_listar_viviendas', { p_codigo_acceso: state.comunidadCode });
        state.loading = false;
        renderAdminPanel();
      } catch (e) {
        state.loading = false;
        setMessage('err', e.message);
      }
    }

    function adminLogout() {
      localStorage.removeItem('reservia73_admin_token');
      state.adminToken = '';
      render();
    }

    window.loadCommunity = loadCommunity;
    window.logoutCommunity = logoutCommunity;
    window.selectResource = selectResource;
    window.changeDate = changeDate;
    window.selectSlot = selectSlot;
    window.createBooking = createBooking;
    window.openCancel = openCancel;
    window.adminLogin = adminLogin;
    window.adminToggleHome = adminToggleHome;
    window.adminLogout = adminLogout;
    window.render = render;

    if (state.comunidadCode) loadCommunity(); else render();
  </script>
</body>
</html>
